<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Pro Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Read data directly created by Swift Engine -->
    <script src="data.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">F1<span>PRO</span></div>
            <div class="driver-list" id="driver-list">
                <!-- Driver buttons will be generated by JS -->
            </div>
            <div class="sidebar-footer">
                Powered by Swift Engine
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="hero" id="hero">
                <div class="hero-content">
                    <h2 class="subtitle" id="driver-team">TEAM</h2>
                    <h1 class="title" id="driver-name">SELECT DRIVER</h1>
                    <p class="description" id="driver-desc">Loading driver database from Swift...</p>
                </div>
                <div class="hero-image-container">
                    <img id="driver-img" src="" alt="Driver Image" class="driver-img">
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Stats Cards -->
                <section class="stats-section">
                    <div class="stat-card">
                        <h3 class="stat-value" id="stat-champ">0</h3>
                        <p class="stat-label">World Championships</p>
                    </div>
                    <div class="stat-card">
                        <h3 class="stat-value" id="stat-wins">0</h3>
                        <p class="stat-label">Grand Prix Wins</p>
                    </div>
                    <div class="stat-card">
                        <h3 class="stat-value" id="stat-pods">0</h3>
                        <p class="stat-label">Podiums</p>
                    </div>
                    <div class="stat-card">
                        <h3 class="stat-value" id="stat-poles">0</h3>
                        <p class="stat-label">Pole Positions</p>
                    </div>
                </section>

                <!-- Chart Section -->
                <section class="chart-section">
                    <h2 class="section-title">Career Performance Points</h2>
                    <div class="chart-container">
                        <canvas id="performanceChart"></canvas>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
